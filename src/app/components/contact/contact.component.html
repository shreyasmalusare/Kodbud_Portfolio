<section class="contact-section" id="contact">
  <div class="section-header">
    <h2 class="title">Let's <span class="highlight">Connect</span></h2>
    <p class="subtitle">Open for new opportunities and collaborations.</p>
  </div>

  <div class="form-container glass-panel">
    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
      
      <div class="input-group">
        <label for="name">Name</label>
        <input type="text" id="name" formControlName="name" placeholder="John Doe"
               [class.invalid]="contactForm.get('name')?.invalid && contactForm.get('name')?.touched">
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email" placeholder="john@example.com"
               [class.invalid]="contactForm.get('email')?.invalid && contactForm.get('email')?.touched">
      </div>

      <div class="input-group">
        <label for="message">Message</label>
        <textarea id="message" formControlName="message" rows="5" placeholder="How can I help you?"
                  [class.invalid]="contactForm.get('message')?.invalid && contactForm.get('message')?.touched"></textarea>
      </div>

      <button type="submit" class="submit-btn" [disabled]="contactForm.invalid && contactForm.touched">
        {{ isSubmitted ? 'Message Sent!' : 'Send Message' }}
      </button>

    </form>
  </div>
</section>
