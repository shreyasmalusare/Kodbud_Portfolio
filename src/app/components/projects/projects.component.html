<section class="projects-section" id="projects">
  <div class="section-header">
    <h2 class="title">Featured <span class="highlight">Work</span></h2>
  </div>

  <div class="projects-grid">
    <div class="project-card glass-panel" *ngFor="let project of portfolioProjects">
      <div class="project-content">
        <div class="company-badge">{{ project.company }}</div>
        <h3>{{ project.title }}</h3>
        <p class="role">{{ project.role }}</p>
        <p class="description">{{ project.description }}</p>
        
        <div class="tech-stack">
          <span class="tech-tag" *ngFor="let tech of project.techStack">{{ tech }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
